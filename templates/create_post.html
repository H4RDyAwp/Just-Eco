{% extends "base.html" %}

{% block title %}Новый пост{% endblock %}
{% block page_title %}Создать пост{% endblock %}
{% block sub_title %}Поделитесь мыслями{% endblock %}

{% block content %}
<form method="POST" action="{{ url_for('create_post_route') }}">
    <div class="form-group">
        <label for="title">Заголовок (необязательно)</label>
        <input type="text" id="title" name="title" placeholder="Заголовок поста" maxlength="100" />
    </div>
    <div class="form-group">
        <label for="content">Текст поста</label>
        <textarea id="content" name="content" rows="5" placeholder="Что у вас нового?" maxlength="1000" required
            style="min-height: 120px;"></textarea>
        <small style="color: var(--text-muted); display: block; margin-top: 0.3rem;">Максимум 1000 символов</small>
    </div>
    <div class="form-group">
        <label for="image_url">Ссылка на изображение (необязательно)</label>
        <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg" />
    </div>
    <button type="submit" class="btn-submit">Опубликовать</button>
</form>
<div class="auth-links">
    <a href="{{ url_for('feed') }}">← Вернуться в ленту</a>
</div>
{% endblock %}
