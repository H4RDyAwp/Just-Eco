{% extends "base.html" %}

{% block title %}Редактировать пост — Just ID{% endblock %}
{% block page_title %}Редактировать пост{% endblock %}
{% block sub_title %}Обновите содержимое{% endblock %}

{% block content %}
<form method="POST" action="{{ url_for('edit_post', post_id=post.id) }}">
    <div class="form-group">
        <label for="title">Заголовок</label>
        <input type="text" id="title" name="title" value="{{ post.title }}" required />
    </div>
    <div class="form-group">
        <label for="content">Текст</label>
        <textarea id="content" name="content" rows="5" required>{{ post.content }}</textarea>
    </div>
    <div class="form-group">
        <label for="image_url">Ссылка на изображение (необязательно)</label>
        <input type="url" id="image_url" name="image_url" value="{{ post.image_url or '' }}"
            placeholder="https://example.com/image.jpg" />
    </div>
    <button type="submit" class="btn-submit">Сохранить изменения</button>
</form>
<div class="auth-links">
    <a href="{{ url_for('dashboard') }}">← На дашборд</a>
</div>
{% endblock %}
