<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JUST UI SHOWCASE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <style>
        /* ============================================================
                   1.  CSS ПЕРЕМЕННЫЕ (THEMING)
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Базовые (по умолчанию) – будут переопределены классами тем */
        :root {
            /* Цвета фона (используются в градиентах) */
            --bg-1: #0f0c29;
            --bg-2: #302b63;
            --bg-3: #24243e;

            /* Стекло */
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.7);
            --glass-inset: inset 0 0 0 1px rgba(255, 255, 255, 0.08);

            /* Текст */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);

            /* Карточки */
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.06);

            /* Бейдж */
            --badge-bg: rgba(255, 255, 255, 0.08);

            /* Цвета орбов (переопределяются пресетами) */
            --orb-1: rgba(120, 80, 255, 0.35);
            --orb-2: rgba(255, 100, 200, 0.25);
            --orb-3: rgba(0, 200, 255, 0.20);

            /* Подсветка от мыши */
            --spotlight-color: rgba(255, 255, 255, 0.05);

            /* Кнопки управления */
            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-border: rgba(255, 255, 255, 0.10);
            --btn-hover-bg: rgba(255, 255, 255, 0.15);
        }

        /* -------------------- ТЕМА: LIGHT -------------------- */
        body.light-mode {
            --bg-1: #e8e6f0;
            --bg-2: #d9d6e6;
            --bg-3: #cbc8d9;

            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.50);
            --glass-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.10);
            --glass-inset: inset 0 0 0 1px rgba(255, 255, 255, 0.60);

            --text-primary: #1a1a2e;
            --text-secondary: rgba(30, 30, 50, 0.7);
            --text-muted: rgba(30, 30, 50, 0.5);

            --card-bg: rgba(255, 255, 255, 0.30);
            --card-border: rgba(255, 255, 255, 0.40);
            --badge-bg: rgba(0, 0, 0, 0.06);

            --orb-1: rgba(120, 80, 255, 0.20);
            --orb-2: rgba(255, 100, 200, 0.15);
            --orb-3: rgba(0, 200, 255, 0.12);

            --spotlight-color: rgba(255, 255, 255, 0.35);

            --btn-bg: rgba(0, 0, 0, 0.06);
            --btn-border: rgba(0, 0, 0, 0.08);
            --btn-hover-bg: rgba(0, 0, 0, 0.12);
        }

        /* -------------------- ТЕМА: DART (бывшая тёмная) -------------------- */
        body.dart-mode {
            /* Все переменные совпадают с :root, но мы явно задаём их для ясности */
            --bg-1: #0f0c29;
            --bg-2: #302b63;
            --bg-3: #24243e;

            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.7);
            --glass-inset: inset 0 0 0 1px rgba(255, 255, 255, 0.08);

            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.35);

            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.06);
            --badge-bg: rgba(255, 255, 255, 0.08);

            --orb-1: rgba(120, 80, 255, 0.35);
            --orb-2: rgba(255, 100, 200, 0.25);
            --orb-3: rgba(0, 200, 255, 0.20);

            --spotlight-color: rgba(255, 255, 255, 0.05);

            --btn-bg: rgba(255, 255, 255, 0.08);
            --btn-border: rgba(255, 255, 255, 0.10);
            --btn-hover-bg: rgba(255, 255, 255, 0.15);
        }

        /* -------------------- ТЕМА: DARK (настоящая тёмная) -------------------- */
        body.dark-mode {
            --bg-1: #0a0a0a;
            --bg-2: #111111;
            --bg-3: #1a1a1a;

            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.9);
            --glass-inset: inset 0 0 0 1px rgba(255, 255, 255, 0.04);

            --text-primary: #f0f0f0;
            --text-secondary: rgba(255, 255, 255, 0.45);
            --text-muted: rgba(255, 255, 255, 0.25);

            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.04);
            --badge-bg: rgba(255, 255, 255, 0.04);

            --orb-1: rgba(60, 60, 80, 0.25);
            --orb-2: rgba(80, 60, 100, 0.15);
            --orb-3: rgba(40, 80, 120, 0.12);

            --spotlight-color: rgba(255, 255, 255, 0.02);

            --btn-bg: rgba(255, 255, 255, 0.04);
            --btn-border: rgba(255, 255, 255, 0.06);
            --btn-hover-bg: rgba(255, 255, 255, 0.08);
        }

        /* ============================================================
                   2.  ЦВЕТОВЫЕ ПРЕСЕТЫ (орбы)
                   ============================================================ */
        body.theme-cool {
            --orb-1: rgba(120, 80, 255, 0.35);
            --orb-2: rgba(0, 200, 255, 0.25);
            --orb-3: rgba(100, 100, 255, 0.20);
        }

        body.theme-warm {
            --orb-1: rgba(255, 120, 50, 0.35);
            --orb-2: rgba(255, 80, 80, 0.25);
            --orb-3: rgba(255, 200, 50, 0.20);
        }

        body.theme-neon {
            --orb-1: rgba(0, 255, 200, 0.30);
            --orb-2: rgba(255, 0, 200, 0.25);
            --orb-3: rgba(0, 200, 255, 0.25);
        }

        /* ============================================================
                   3.  БАЗОВЫЕ СТИЛИ
                   ============================================================ */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-1);
            padding: 1.5rem;
            transition: background 0.6s ease, color 0.4s ease;
            perspective: 1200px;
            cursor: default;
            overflow: hidden;
        }

        /* Подсветка, следующая за мышью */
        #spotlight {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%),
                    var(--spotlight-color) 0%,
                    transparent 60%);
            opacity: 0.9;
            transition: background 0.3s ease;
            will-change: background;
        }

        /* ============================================================
                   4.  ФОН И ОРБЫ
                   ============================================================ */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, var(--bg-1), var(--bg-2), var(--bg-3));
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Слой с цветными пятнами (анимированный) */
        .bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 70% 30%, var(--orb-1) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, var(--orb-2) 0%, transparent 55%),
                radial-gradient(circle at 80% 70%, var(--orb-3) 0%, transparent 50%);
            animation: bgShift 18s ease-in-out infinite alternate;
            transition: background 0.8s ease;
            transform: scale(1.8);
            /* увеличиваем, чтобы не было видно краёв */
        }

        @keyframes bgShift {
            0% {
                transform: scale(1.8) rotate(0deg);
                opacity: 0.7;
            }

            50% {
                transform: scale(2.0) rotate(3deg);
                opacity: 1;
            }

            100% {
                transform: scale(1.6) rotate(-2deg);
                opacity: 0.8;
            }
        }

        /* Плавающие шары (большие и размытые) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            /* уменьшил с 100px */
            opacity: 0.6;
            animation: orbFloat 16s ease-in-out infinite alternate;
            transition: background 0.8s ease;
        }

        .orb--1 {
            width: 800px;
            height: 800px;
            top: -20%;
            left: -20%;
            background: radial-gradient(circle, var(--orb-1), transparent);
            animation-duration: 20s;
        }

        .orb--2 {
            width: 700px;
            height: 700px;
            bottom: -25%;
            right: -25%;
            background: radial-gradient(circle, var(--orb-2), transparent);
            animation-duration: 22s;
            animation-delay: -4s;
        }

        .orb--3 {
            width: 600px;
            height: 600px;
            top: 30%;
            left: 30%;
            background: radial-gradient(circle, var(--orb-3), transparent);
            animation-duration: 18s;
            animation-delay: -8s;
            opacity: 0.4;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(60px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-40px, 60px) scale(0.9);
            }

            100% {
                transform: translate(30px, -20px) scale(1.05);
            }
        }

        /* ============================================================
                   5.  СТЕКЛЯННАЯ КАРТОЧКА
                   ============================================================ */
        .glass {
            position: relative;
            z-index: 1;
            max-width: 860px;
            width: 100%;
            padding: 2.5rem 3rem;
            border-radius: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.8);
            /* уменьшил с 40px */
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border: 1px solid var(--glass-border);
            box-shadow:
                var(--glass-shadow),
                var(--glass-inset),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                inset 0 -1px 0 rgba(255, 255, 255, 0.04);
            transition: box-shadow 0.4s ease, border-color 0.4s ease, background 0.5s ease;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .glass:hover {
            border-color: rgba(255, 255, 255, 0.18);
            box-shadow:
                0 40px 80px -20px rgba(0, 0, 0, 0.7),
                var(--glass-inset),
                inset 0 1px 0 rgba(255, 255, 255, 0.20);
        }

        /* Контурная обводка (жидкая кромка) */
        .glass::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 3rem;
            padding: 1px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.30) 0%,
                    rgba(255, 255, 255, 0.05) 40%,
                    rgba(255, 255, 255, 0) 60%,
                    rgba(255, 255, 255, 0.12) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.7;
            transition: opacity 0.5s ease;
        }

        .glass:hover::before {
            opacity: 1;
        }

        /* Блик в левом верхнем углу */
        .glass::after {
            content: '';
            position: absolute;
            top: 6%;
            left: 8%;
            width: 55%;
            height: 30%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center,
                    rgba(255, 255, 255, 0.10) 0%,
                    transparent 70%);
            pointer-events: none;
            filter: blur(10px);
            /* уменьшил с 16px */
            opacity: 0.8;
            transition: opacity 0.6s ease;
        }

        /* Второй блик (справа снизу) для усиления «стеклянности» */
        .glass .gloss-bottom {
            position: absolute;
            bottom: 6%;
            right: 8%;
            width: 40%;
            height: 20%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center,
                    rgba(255, 255, 255, 0.06) 0%,
                    transparent 70%);
            pointer-events: none;
            filter: blur(8px);
            /* уменьшил с 14px */
            opacity: 0.6;
            transition: opacity 0.6s ease;
            z-index: 1;
        }

        .glass:hover .gloss-bottom {
            opacity: 0.9;
        }

        /* ============================================================
                   6.  КОНТЕНТ
                   ============================================================ */
        .content {
            position: relative;
            z-index: 2;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transition: color 0.4s ease;
        }

        /* Шапка */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem 0.4rem 0.8rem;
            border-radius: 100px;
            background: var(--badge-bg);
            border: 1px solid var(--glass-border);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text-secondary);
            backdrop-filter: blur(8px);
            transition: background 0.3s, color 0.3s;
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* Заголовок с переливающимся градиентом */
        .title-group h1 {
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.05;
            background: linear-gradient(135deg,
                    var(--text-primary) 0%,
                    var(--text-secondary) 30%,
                    var(--text-primary) 60%,
                    var(--text-secondary) 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .title-group .sub {
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-top: 0.3rem;
            letter-spacing: 0.01em;
        }

        /* Карточки-фичи */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1.25rem;
            margin-top: 0.5rem;
        }

        .card {
            padding: 1.5rem 1.5rem 1.75rem;
            border-radius: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: default;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.4);
        }

        body.light-mode .card:hover {
            background: rgba(255, 255, 255, 0.50);
            border-color: rgba(0, 0, 0, 0.10);
        }

        .card .icon {
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            margin-bottom: 0.25rem;
        }

        .card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        /* ============================================================
                   7.  ФУТЕР + УПРАВЛЕНИЕ
                   ============================================================ */
        .footer {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--glass-border);
            transition: border-color 0.3s;
        }

        .footer-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer .meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Кнопки управления (темы, пресеты) */
        .controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-secondary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            font-family: inherit;
        }

        .ctrl-btn:hover {
            background: var(--btn-hover-bg);
            transform: scale(1.08);
            border-color: var(--text-secondary);
        }

        .ctrl-btn.active {
            background: var(--text-primary);
            color: var(--bg-1);
            border-color: var(--text-primary);
        }

        body.light-mode .ctrl-btn.active {
            background: #1a1a2e;
            color: #fff;
        }

        /* Кнопки для выбора темы (с текстом) */
        .ctrl-btn.theme-btn {
            width: auto;
            padding: 0 0.8rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            gap: 0.3rem;
        }

        /* Слайдер 3D множителя */
        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            padding: 0.25rem 0;
        }

        .slider-wrap label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .slider-wrap input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--glass-border);
            outline: none;
            transition: background 0.3s;
            cursor: pointer;
        }

        .slider-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-primary);
            border: 2px solid var(--glass-bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: 0.15s;
            cursor: pointer;
        }

        .slider-wrap input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .slider-wrap input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-primary);
            border: 2px solid var(--glass-bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .slider-value {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 2.5rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* ============================================================
                   8.  АДАПТИВНОСТЬ
                   ============================================================ */
        @media (max-width: 600px) {
            .glass {
                padding: 1.75rem 1.5rem;
                border-radius: 2rem;
            }

            .glass::before {
                border-radius: 2rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .cards {
                grid-template-columns: 1fr 1fr;
            }

            .footer-top {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: flex-start;
            }

            .slider-wrap {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 400px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .glass {
                padding: 1.25rem 1rem;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
    HTML РАЗМЕТКА
    ============================================================ -->

    <!-- Подсветка, следующая за курсором -->
    <div id="spotlight"></div>

    <!-- Фоновые орбы -->
    <div class="bg">
        <div class="orb orb--1"></div>
        <div class="orb orb--2"></div>
        <div class="orb orb--3"></div>
    </div>

    <!-- Основная стеклянная карточка -->
    <div class="glass" id="glass">
        <!-- Дополнительный блик снизу -->
        <div class="gloss-bottom"></div>

        <div class="content">
            <!-- Шапка -->
            <div class="header">
                <div class="title-group">
                    <h1>JUST UI</h1>
                    <div class="sub">Made · by · h4rdy.dev</div>
                </div>
                <div class="badge">
                    <span class="dot"></span>
                    V 1.1
                </div>
            </div>

            <!-- Карточки -->
            <div class="cards">
                <div class="card">
                    <span class="icon">✨</span>
                    <h3>Frosted</h3>
                    <p>Blur &amp; saturate with layered transparency.</p>
                </div>
                <div class="card">
                    <span class="icon">💎</span>
                    <h3>Specular</h3>
                    <p>Dual highlights &amp; reactive edge glow.</p>
                </div>
                <div class="card">
                    <span class="icon">🌀</span>
                    <h3>Liquid</h3>
                    <p>Orbital depth &amp; silky smooth motion.</p>
                </div>
            </div>

            <!-- Футер с управлением -->
            <div class="footer">
                <div class="footer-top">
                    <span class="meta">✦ 2026 · Pure CSS + JS</span>
                    <div class="controls">
                        <!-- Кнопки выбора темы -->
                        <button class="ctrl-btn theme-btn" data-theme="light" title="Светлая тема">☀️ Light</button>
                        <button class="ctrl-btn theme-btn active" data-theme="dart" title="Тёмная (Dart)">🌙
                            Dart</button>
                        <button class="ctrl-btn theme-btn" data-theme="dark" title="Настоящая тёмная">🌑 Dark</button>

                        <!-- Разделитель (можно убрать, но оставим для красоты) -->
                        <span style="opacity:0.2; margin: 0 0.2rem;">|</span>

                        <!-- Цветовые пресеты (орбы) -->
                        <button class="ctrl-btn active" data-preset="cool" title="Холодный">❄️</button>
                        <button class="ctrl-btn" data-preset="warm" title="Тёплый">🔥</button>
                        <button class="ctrl-btn" data-preset="neon" title="Неоновый">💜</button>
                    </div>
                </div>

                <!-- Слайдер множителя 3D-эффекта -->
                <div class="slider-wrap">
                    <label for="tiltMultiplier">3D tilt</label>
                    <input type="range" id="tiltMultiplier" min="0" max="2" step="0.01" value="1" />
                    <span class="slider-value" id="tiltValue">1.00×</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function () {
            'use strict';

            // --- Получаем ссылки на элементы ---
            const glass = document.getElementById('glass');
            const spotlight = document.getElementById('spotlight');
            const body = document.body;

            // --- Слайдер 3D множителя ---
            const slider = document.getElementById('tiltMultiplier');
            const tiltDisplay = document.getElementById('tiltValue');
            let tiltMultiplier = 1;

            slider.addEventListener('input', () => {
                tiltMultiplier = parseFloat(slider.value);
                tiltDisplay.textContent = tiltMultiplier.toFixed(2) + '×';
            });

            // --- Плавный 3D наклон с множителем (LERP) ---
            let targetX = 0,
                targetY = 0;
            let currentX = 0,
                currentY = 0;
            const BASE_MAX_ANGLE = 8; // градусы

            glass.addEventListener('mousemove', (e) => {
                const rect = glass.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                // Применяем множитель к максимальному углу
                const maxAngle = BASE_MAX_ANGLE * tiltMultiplier;
                targetX = ((y - centerY) / centerY) * -maxAngle;
                targetY = ((x - centerX) / centerX) * maxAngle;
            });

            glass.addEventListener('mouseleave', () => {
                targetX = 0;
                targetY = 0;
            });

            function animateTilt() {
                // Интерполяция (LERP) – плавное следование
                currentX += (targetX - currentX) * 0.08;
                currentY += (targetY - currentY) * 0.08;
                glass.style.transform =
                    `rotateX(${currentX}deg) rotateY(${currentY}deg) scale(1.01)`;
                requestAnimationFrame(animateTilt);
            }
            animateTilt();

            // --- Подсветка от мыши (spotlight) ---
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                spotlight.style.setProperty('--mx', x + '%');
                spotlight.style.setProperty('--my', y + '%');
            });

            // --- УПРАВЛЕНИЕ ТЕМАМИ (Light / Dart / Dark) ---
            // Находим все кнопки с data-theme
            const themeBtns = document.querySelectorAll('[data-theme]');

            // Функция установки темы
            function setTheme(theme) {
                // Убираем все классы тем
                body.classList.remove('light-mode', 'dart-mode', 'dark-mode');
                // Добавляем нужный
                if (theme === 'light') body.classList.add('light-mode');
                else if (theme === 'dart') body.classList.add('dart-mode');
                else if (theme === 'dark') body.classList.add('dark-mode');

                // Обновляем активную кнопку
                themeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });

                // Сохраняем в localStorage
                localStorage.setItem('glass-theme', theme);
            }

            // Загружаем сохранённую тему (по умолчанию 'dart')
            const savedTheme = localStorage.getItem('glass-theme') || 'dart';
            setTheme(savedTheme);

            // Вешаем обработчики на кнопки тем
            themeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    setTheme(theme);
                });
            });

            // --- УПРАВЛЕНИЕ ЦВЕТОВЫМИ ПРЕСЕТАМИ (орбы) ---
            const presetBtns = document.querySelectorAll('[data-preset]');

            function setPreset(preset) {
                // Убираем все классы пресетов
                body.classList.remove('theme-cool', 'theme-warm', 'theme-neon');
                if (preset !== 'cool') { // 'cool' – базовый, его не добавляем
                    body.classList.add('theme-' + preset);
                }
                // Обновляем активную кнопку
                presetBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.preset === preset);
                });
                localStorage.setItem('glass-preset', preset);
            }

            const savedPreset = localStorage.getItem('glass-preset') || 'cool';
            setPreset(savedPreset);

            presetBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const preset = btn.dataset.preset;
                    setPreset(preset);
                });
            });

            // --- Сброс наклона, если мышь покинула окно ---
            document.addEventListener('mouseleave', () => {
                targetX = 0;
                targetY = 0;
            });

        })();
    </script>

</body>

</html>
